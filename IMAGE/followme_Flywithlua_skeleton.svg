<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="900" viewBox="0 0 1300 900">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1300" height="900" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="0" y="0" width="1300" height="56" fill="#1a1a2e" rx="0"/>
  <text x="650" y="36" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">FollowMe — Skeleton Architecture in FlyWithLua / X-Plane 12 Context</text>

  <!-- ==================== ZONE 1: STARTUP ==================== -->
  <rect x="30" y="75" width="580" height="175" fill="#e8f4fd" stroke="#2196F3" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="30" y="75" width="580" height="36" fill="#2196F3" rx="12"/>
  <rect x="30" y="99" width="580" height="12" fill="#2196F3"/>
  <text x="320" y="99" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">🚀  STARTUP  —  Executed ONCE at script load</text>

  <!-- Module 1 -->
  <rect x="50" y="122" width="250" height="115" fill="white" stroke="#2196F3" stroke-width="1.5" rx="8"/>
  <rect x="50" y="122" width="250" height="28" fill="#42A5F5" rx="8"/>
  <rect x="50" y="138" width="250" height="12" fill="#42A5F5"/>
  <text x="175" y="141" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MODULE 1 · core_init.lua</text>
  <text x="65" y="163" font-family="Arial" font-size="11" fill="#333">• Global variables &amp; state flags</text>
  <text x="65" y="179" font-family="Arial" font-size="11" fill="#333">• FFI / XPLM bindings</text>
  <text x="65" y="195" font-family="Arial" font-size="11" fill="#333">• Datarefs registration</text>
  <text x="65" y="211" font-family="Arial" font-size="11" fill="#333">• Sound &amp; config loading</text>

  <!-- Module 5 (UI init) -->
  <rect x="320" y="122" width="270" height="115" fill="white" stroke="#2196F3" stroke-width="1.5" rx="8"/>
  <rect x="320" y="122" width="270" height="28" fill="#42A5F5" rx="8"/>
  <rect x="320" y="138" width="270" height="12" fill="#42A5F5"/>
  <text x="455" y="141" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MODULE 5 · ui_imgui.lua</text>
  <text x="335" y="163" font-family="Arial" font-size="11" fill="#333">• ImGui window creation</text>
  <text x="335" y="179" font-family="Arial" font-size="11" fill="#333">• Button &amp; panel definitions</text>
  <text x="335" y="195" font-family="Arial" font-size="11" fill="#333">• FM button → triggers Module 2</text>
  <text x="335" y="211" font-family="Arial" font-size="11" fill="#333">• Status display setup</text>

  <!-- ==================== ZONE 2: DO_OFTEN ==================== -->
  <rect x="30" y="268" width="580" height="140" fill="#fff8e1" stroke="#FFC107" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="30" y="268" width="580" height="36" fill="#FFC107" rx="12"/>
  <rect x="30" y="292" width="580" height="12" fill="#FFC107"/>
  <text x="320" y="292" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">🔁  do_often( )  —  ~Every second  |  Light monitoring</text>

  <!-- Module 2 trigger zone -->
  <rect x="50" y="315" width="540" height="82" fill="white" stroke="#FFC107" stroke-width="1.5" rx="8"/>
  <rect x="50" y="315" width="540" height="28" fill="#FFD54F" rx="8"/>
  <rect x="50" y="331" width="540" height="12" fill="#FFD54F"/>
  <text x="320" y="334" font-family="Arial" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">MODULE 2 · airport_data.lua  —  ICAO Watchdog only</text>
  <text x="65" y="357" font-family="Arial" font-size="11" fill="#333">• Read current ICAO dataref</text>
  <text x="65" y="373" font-family="Arial" font-size="11" fill="#555">• If ICAO changed → set flag  airport_changed = true  (heavy load deferred to do_sometimes)</text>

  <!-- ==================== ZONE 3: DO_SOMETIMES ==================== -->
  <rect x="30" y="426" width="580" height="145" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="30" y="426" width="580" height="36" fill="#9C27B0" rx="12"/>
  <rect x="30" y="450" width="580" height="12" fill="#9C27B0"/>
  <text x="320" y="450" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">⏳  do_sometimes( )  —  Every few seconds  |  Heavy tasks</text>

  <!-- Module 2 heavy -->
  <rect x="50" y="473" width="255" height="88" fill="white" stroke="#9C27B0" stroke-width="1.5" rx="8"/>
  <rect x="50" y="473" width="255" height="28" fill="#CE93D8" rx="8"/>
  <rect x="50" y="489" width="255" height="12" fill="#CE93D8"/>
  <text x="177" y="492" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">MODULE 2 · airport_data.lua</text>
  <text x="65" y="514" font-family="Arial" font-size="11" fill="#333">• If airport_changed = true</text>
  <text x="65" y="530" font-family="Arial" font-size="11" fill="#333">• Parse apt.dat → build graph</text>
  <text x="65" y="546" font-family="Arial" font-size="11" fill="#333">• Reset flag after load</text>

  <!-- Module 3 -->
  <rect x="325" y="473" width="265" height="88" fill="white" stroke="#9C27B0" stroke-width="1.5" rx="8"/>
  <rect x="325" y="473" width="265" height="28" fill="#CE93D8" rx="8"/>
  <rect x="325" y="489" width="265" height="12" fill="#CE93D8"/>
  <text x="457" y="492" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">MODULE 3 · pathfinding.lua</text>
  <text x="340" y="514" font-family="Arial" font-size="11" fill="#333">• If route_requested = true</text>
  <text x="340" y="530" font-family="Arial" font-size="11" fill="#333">• Run A* algorithm</text>
  <text x="340" y="546" font-family="Arial" font-size="11" fill="#333">• Store waypoints list</text>

  <!-- ==================== ZONE 4: DO_EVERY_FRAME ==================== -->
  <rect x="30" y="589" width="580" height="140" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="30" y="589" width="580" height="36" fill="#4CAF50" rx="12"/>
  <rect x="30" y="613" width="580" height="12" fill="#4CAF50"/>
  <text x="320" y="613" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">⚡  do_every_frame( )  —  Every frame  |  Physics only, NO drawing</text>

  <!-- Module 4 -->
  <rect x="50" y="636" width="540" height="83" fill="white" stroke="#4CAF50" stroke-width="1.5" rx="8"/>
  <rect x="50" y="636" width="540" height="28" fill="#66BB6A" rx="8"/>
  <rect x="50" y="652" width="540" height="12" fill="#66BB6A"/>
  <text x="320" y="655" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MODULE 4 · vehicle_physics.lua</text>
  <text x="65" y="677" font-family="Arial" font-size="11" fill="#333">• Update car position &amp; heading (follow waypoints)</text>
  <text x="65" y="693" font-family="Arial" font-size="11" fill="#333">• Speed, turning, braking logic    |    Update state flags for renderer</text>

  <!-- ==================== ZONE 5: DO_EVERY_DRAW ==================== -->
  <rect x="630" y="75" width="640" height="395" fill="#fce4ec" stroke="#E91E63" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="630" y="75" width="640" height="36" fill="#E91E63" rx="12"/>
  <rect x="630" y="99" width="640" height="12" fill="#E91E63"/>
  <text x="950" y="99" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">🎨  do_every_draw( )  —  Every frame  |  DISPLAY ONLY, no calculations</text>

  <!-- Module 6 -->
  <rect x="650" y="122" width="600" height="335" fill="white" stroke="#E91E63" stroke-width="1.5" rx="8"/>
  <rect x="650" y="122" width="600" height="28" fill="#F48FB1" rx="8"/>
  <rect x="650" y="138" width="600" height="12" fill="#F48FB1"/>
  <text x="950" y="141" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MODULE 6 · renderer.lua</text>
  <text x="670" y="168" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">X-Plane 3D World</text>
  <text x="670" y="186" font-family="Arial" font-size="11" fill="#333">• Draw Follow-Me car (3D object via XPLM)</text>
  <text x="670" y="202" font-family="Arial" font-size="11" fill="#333">• Draw route line on taxiway</text>
  <text x="670" y="218" font-family="Arial" font-size="11" fill="#333">• Draw waypoint markers</text>
  <text x="670" y="240" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">ImGui Overlay (2D)</text>
  <text x="670" y="258" font-family="Arial" font-size="11" fill="#333">• Refresh status panel (speed, distance, next waypoint)</text>
  <text x="670" y="274" font-family="Arial" font-size="11" fill="#333">• Update progress indicators</text>
  <text x="670" y="296" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">Debug Overlay (optional)</text>
  <text x="670" y="314" font-family="Arial" font-size="11" fill="#555">• Show graph nodes &amp; edges (dev mode)</text>
  <text x="670" y="330" font-family="Arial" font-size="11" fill="#555">• Display A* path debug info</text>
  <text x="670" y="352" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">⚠️  Rule: READ state only — NEVER modify data here</text>
  <text x="670" y="370" font-family="Arial" font-size="11" fill="#555">Renderer reads flags &amp; positions set by vehicle_physics.lua and pathfinding.lua</text>
  <text x="670" y="390" font-family="Arial" font-size="11" fill="#555">It NEVER calls A*, NEVER moves the car, NEVER reads apt.dat</text>
  <text x="670" y="430" font-family="Arial" font-size="11" fill="#555"> </text>

  <!-- ==================== ZONE 6: DO_ON_EXIT ==================== -->
  <rect x="630" y="490" width="640" height="120" fill="#fbe9e7" stroke="#FF5722" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="630" y="490" width="640" height="36" fill="#FF5722" rx="12"/>
  <rect x="630" y="514" width="640" height="12" fill="#FF5722"/>
  <text x="950" y="514" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">🛑  do_on_exit( )  —  Once on script unload / X-Plane quit</text>
  <rect x="650" y="537" width="600" height="63" fill="white" stroke="#FF5722" stroke-width="1.5" rx="8"/>
  <text x="950" y="558" font-family="Arial" font-size="12" font-weight="bold" fill="#bf360c" text-anchor="middle">ALL MODULES — Cleanup</text>
  <text x="670" y="576" font-family="Arial" font-size="11" fill="#333">• Free 3D objects &amp; textures (renderer)    •  Clear graph &amp; waypoints (pathfinding)</text>
  <text x="670" y="592" font-family="Arial" font-size="11" fill="#333">• Save user config (core_init)    •  Destroy ImGui window (ui_imgui)</text>

  <!-- ==================== ZONE 7: ON-DEMAND ==================== -->
  <rect x="630" y="628" width="640" height="100" fill="#e0f2f1" stroke="#009688" stroke-width="2" rx="12" filter="url(#shadow)"/>
  <rect x="630" y="628" width="640" height="36" fill="#009688" rx="12"/>
  <rect x="630" y="652" width="640" height="12" fill="#009688"/>
  <text x="950" y="652" font-family="Arial" font-size="15" font-weight="bold" fill="white" text-anchor="middle">🖱️  ON DEMAND  —  Triggered by user action (FM button)</text>
  <rect x="650" y="675" width="600" height="43" fill="white" stroke="#009688" stroke-width="1.5" rx="8"/>
  <text x="950" y="694" font-family="Arial" font-size="12" font-weight="bold" fill="#004d40" text-anchor="middle">SimBrief HTTP fetch (optional) — MODULE async call</text>
  <text x="670" y="712" font-family="Arial" font-size="11" fill="#333">• Fetch flight plan from SimBrief API    •  Set route_requested = true → triggers pathfinding</text>

  <!-- ==================== BOTTOM: DATA FLOW ==================== -->
  <rect x="30" y="745" width="1240" height="130" fill="#eceff1" stroke="#90A4AE" stroke-width="1.5" rx="12"/>
  <rect x="30" y="745" width="1240" height="30" fill="#607D8B" rx="12"/>
  <rect x="30" y="763" width="1240" height="12" fill="#607D8B"/>
  <text x="650" y="766" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">📦  Shared State — Read by all modules, written only by their owner</text>
  
  <text x="55" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#1565c0">core_init owns:</text>
  <text x="55" y="811" font-family="Arial" font-size="10" fill="#333">current_icao, airport_changed,</text>
  <text x="55" y="825" font-family="Arial" font-size="10" fill="#333">route_requested, fm_active</text>

  <text x="270" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a">airport_data owns:</text>
  <text x="270" y="811" font-family="Arial" font-size="10" fill="#333">graph{}, nodes{},</text>
  <text x="270" y="825" font-family="Arial" font-size="10" fill="#333">edges{}, parkings{}</text>

  <text x="490" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#1b5e20">pathfinding owns:</text>
  <text x="490" y="811" font-family="Arial" font-size="10" fill="#333">waypoints{}, route{},</text>
  <text x="490" y="825" font-family="Arial" font-size="10" fill="#333">current_target_idx</text>

  <text x="710" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#33691e">vehicle_physics owns:</text>
  <text x="710" y="811" font-family="Arial" font-size="10" fill="#333">car_x, car_y, car_z,</text>
  <text x="710" y="825" font-family="Arial" font-size="10" fill="#333">car_heading, car_speed</text>

  <text x="940" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#880e4f">renderer reads:</text>
  <text x="940" y="811" font-family="Arial" font-size="10" fill="#333">all of the above —</text>
  <text x="940" y="825" font-family="Arial" font-size="10" fill="#333">NEVER writes shared state</text>

  <text x="1150" y="795" font-family="Arial" font-size="11" font-weight="bold" fill="#bf360c">ui_imgui reads:</text>
  <text x="1150" y="811" font-family="Arial" font-size="10" fill="#333">fm_active, route{},</text>
  <text x="1150" y="825" font-family="Arial" font-size="10" fill="#333">car_speed, status msgs</text>

  <!-- Dividers -->
  <line x1="255" y1="778" x2="255" y2="840" stroke="#90A4AE" stroke-width="1"/>
  <line x1="475" y1="778" x2="475" y2="840" stroke="#90A4AE" stroke-width="1"/>
  <line x1="700" y1="778" x2="700" y2="840" stroke="#90A4AE" stroke-width="1"/>
  <line x1="930" y1="778" x2="930" y2="840" stroke="#90A4AE" stroke-width="1"/>
  <line x1="1140" y1="778" x2="1140" y2="840" stroke="#90A4AE" stroke-width="1"/>

  <!-- Footer -->
  <text x="650" y="886" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">FollowMe v1.19 — Restructured Modular Architecture — FlyWithLua / X-Plane 12</text>
</svg>