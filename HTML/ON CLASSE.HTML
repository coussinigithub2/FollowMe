<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Filtrage trajectoire piste 10 → 28</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}
.box {
    padding: 10px;
    background: #f4f4f4;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}
.red { color: red; font-weight: bold; }
.green { color: green; }
.gray { color: gray; }
</style>
</head>

<body>

<h1>Test filtrage trajectoire taxi</h1>

<div id="case1" class="box"></div>
<div id="case2" class="box"></div>

<script>

// =======================
// SEUIL OPPOSÉ (28)
// =======================
const runway28 = { id: "28", coords: [45.5400, -73.6200] };

// =======================
// CAS 1
// =======================
const case1Points = [
    { id: 1, coords: [45.5050, -73.5500] },
    { id: 4, coords: [45.5070, -73.5520] },
    { id: 7, coords: [45.5100, -73.5650] },
    { id: 8, coords: [45.5120, -73.5750] },
    { id: 10, coords: [45.5000, -73.5600] } // seuil
];

// =======================
// CAS 2
// =======================
const case2Points = [
    { id: 1, coords: [45.5060, -73.5580] },
    { id: 2, coords: [45.5080, -73.5620] },
    { id: 3, coords: [45.5100, -73.5660] },
    { id: 4, coords: [45.5120, -73.5700] },
    { id: 5, coords: [45.5150, -73.5750] },
    { id: 6, coords: [45.5180, -73.5800] },
    { id: 7, coords: [45.5220, -73.5880] },
    { id: 8, coords: [45.5250, -73.5950] },
    { id: 10, coords: [45.5000, -73.5600] } // seuil
];

// =======================
// DISTANCE (HAVERSINE)
// =======================
function distance(a, b) {
    const R = 6371;
    const dLat = (b[0] - a[0]) * Math.PI / 180;
    const dLon = (b[1] - a[1]) * Math.PI / 180;

    const x =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(a[0] * Math.PI / 180) *
        Math.cos(b[0] * Math.PI / 180) *
        Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

// =======================
// ALIGNEMENT AXE PISTE (PROJECTION)
// =======================
function isAlongRunway(p, start, end) {

    const vx = end.coords[1] - start.coords[1];
    const vy = end.coords[0] - start.coords[0];

    const wx = p.coords[1] - start.coords[1];
    const wy = p.coords[0] - start.coords[0];

    const dot = vx * wx + vy * wy;
    const lenSq = vx * vx + vy * vy;

    const t = dot / lenSq;

    return t >= 0 && t <= 1;
}

// =======================
// FILTRE PRINCIPAL
// =======================
function filterTrajectory(points) {

    const destination = points[points.length - 1];

    // 1. points alignés sur la piste
    const aligned = points.filter(p =>
        isAlongRunway(p, destination, runway28)
    );

    // 2. progression vers le seuil
    const kept = [];
    const rejected = [];

    let prev = null;

    for (let p of aligned) {

        if (p.id === destination.id) {
            kept.push(p);
            continue;
        }

        if (!prev) {
            kept.push(p);
            prev = p;
            continue;
        }

        const dPrev = distance(prev.coords, destination.coords);
        const dNow = distance(p.coords, destination.coords);

        if (dNow <= dPrev) {
            kept.push(p);
            prev = p;
        } else {
            rejected.push(p);
        }
    }

    return { kept, rejected, aligned };
}

// =======================
// AFFICHAGE
// =======================
function render(id, data) {

    const { kept, rejected, aligned } = filterTrajectory(data);
    const destination = data[data.length - 1];

    const html = data.map(p => {

        if (p.id === destination.id) {
            return `<span class="green">Point ${p.id} (seuil)</span>`;
        }

        if (!aligned.find(a => a.id === p.id)) {
            return `<span class="gray">Point ${p.id}</span>`;
        }

        if (rejected.find(r => r.id === p.id)) {
            return `<span class="red">Point ${p.id}</span>`;
        }

        return `<span class="green">Point ${p.id}</span>`;
    });

    document.getElementById(id).innerHTML = html.join("<br>");
}

// =======================
// RUN
// =======================
render("case1", case1Points);
render("case2", case2Points);

</script>

</body>
</html>
