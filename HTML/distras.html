<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chemin le plus court - Taxiway</title>
<style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; margin-bottom: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; }
    th { background: #eee; }
    input { padding: 5px; margin-right: 10px; }
    #result { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<h2>Tableau des nœuds (coordonnées fictives)</h2>
<table>
<tr><th>Nœud</th><th>Latitude</th><th>Longitude</th></tr>
<tbody id="nodesTable"></tbody>
</table>

<h2>Tableau des connexions (liste d’adjacence)</h2>
<table>
<tr><th>Nœud</th><th>Voisins</th></tr>
<tbody id="graphTable"></tbody>
</table>

<h3>Calcul du chemin le plus court</h3>
Départ : <input id="start" maxlength="1">
Destination : <input id="end" maxlength="1">
<button onclick="compute()">Calculer</button>

<div id="result"></div>

<script>
// ---------------------------
// 1. Données des nœuds
// ---------------------------
const nodes = {
  "A": { "lat": 45.0000, "lon": -73.0000 },
  "B": { "lat": 45.0020, "lon": -73.0010 },
  "C": { "lat": 45.0035, "lon": -73.0020 },
  "D": { "lat": 45.0050, "lon": -73.0030 },
  "E": { "lat": 45.0010, "lon": -73.0005 },
  "F": { "lat": 45.0060, "lon": -73.0045 },
  "G": { "lat": 45.0045, "lon": -73.0025 },
  "H": { "lat": 45.0065, "lon": -73.0035 },
  "I": { "lat": 45.0070, "lon": -73.0050 },
  "J": { "lat": 45.0068, "lon": -73.0040 },
  "K": { "lat": 45.0048, "lon": -73.0060 },
  "L": { "lat": 45.0052, "lon": -73.0040 },
  "M": { "lat": 45.0060, "lon": -73.0020 }
};

// ---------------------------
// 2. Liste d’adjacence
// ---------------------------
const graph = {
  "A": ["E"],
  "B": ["E", "C"],
  "C": ["B", "D"],
  "D": ["C", "G", "L", "M"],
  "E": ["A", "B", "G"],
  "F": ["G", "I", "J"],
  "G": ["D", "E", "F", "H"],
  "H": ["G", "J"],
  "I": ["F"],
  "J": ["F", "H"],
  "K": ["L"],
  "L": ["D", "K"],
  "M": ["D"]
};

// ---------------------------
// 3. Distance entre deux nœuds (Haversine simplifié)
// ---------------------------
function dist(a, b) {
    const dx = nodes[a].lat - nodes[b].lat;
    const dy = nodes[a].lon - nodes[b].lon;
    return Math.sqrt(dx*dx + dy*dy);
}

// ---------------------------
// 4. Dijkstra
// ---------------------------
function dijkstra(start, end) {
    const distMap = {};
    const prev = {};
    const visited = new Set();

    for (let n in graph) distMap[n] = Infinity;
    distMap[start] = 0;

    while (true) {
        let current = null;
        let best = Infinity;

        for (let n in distMap) {
            if (!visited.has(n) && distMap[n] < best) {
                best = distMap[n];
                current = n;
            }
        }

        if (current === null) break;
        if (current === end) break;

        visited.add(current);

        for (let neighbor of graph[current]) {
            const d = distMap[current] + dist(current, neighbor);
            if (d < distMap[neighbor]) {
                distMap[neighbor] = d;
                prev[neighbor] = current;
            }
        }
    }

    // Reconstruction du chemin
    const path = [];
    let cur = end;
    while (cur) {
        path.unshift(cur);
        cur = prev[cur];
    }
    return path;
}

// ---------------------------
// 5. Affichage des tableaux
// ---------------------------
function populateTables() {
    const nt = document.getElementById("nodesTable");
    const gt = document.getElementById("graphTable");

    for (let n in nodes) {
        nt.innerHTML += `<tr><td>${n}</td><td>${nodes[n].lat}</td><td>${nodes[n].lon}</td></tr>`;
    }

    for (let n in graph) {
        gt.innerHTML += `<tr><td>${n}</td><td>${graph[n].join(", ")}</td></tr>`;
    }
}
populateTables();

// ---------------------------
// 6. Calcul du chemin
// ---------------------------
function compute() {
    const s = document.getElementById("start").value.toUpperCase();
    const e = document.getElementById("end").value.toUpperCase();

    if (!nodes[s] || !nodes[e]) {
        document.getElementById("result").innerHTML = "Nœud invalide.";
        return;
    }

    const path = dijkstra(s, e);

    let out = `Départ ${s}; Destination ${e}<br>Chemin :<br>`;
    for (let p of path) {
        out += `${p} (${nodes[p].lat}, ${nodes[p].lon})<br>`;
    }

    document.getElementById("result").innerHTML = out;
}
</script>

</body>
</html>
