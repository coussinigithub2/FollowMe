<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Taxiway Pathfinder — apt.dat Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07090d;
  --panel:    #0d1117;
  --panel2:   #111820;
  --border:   #1c2d3f;
  --border2:  #243548;
  --accent:   #00d4ff;
  --accent2:  #ff6b35;
  --green:    #3dff6e;
  --yellow:   #ffc107;
  --purple:   #b06fff;
  --red:      #ff4444;
  --path:     #ff00aa;
  --dim:      #3a5570;
  --text:     #b8d0e0;
  --text-dim: #4a6880;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Exo 2', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--sans);
  overflow: hidden;
}

/* ── LAYOUT ─────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

#topbar {
  display: flex; align-items: center; gap: 20px;
  padding: 0 20px; height: 52px; flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#topbar h1 {
  font-size: 20px; font-weight: 800; letter-spacing: 5px;
  color: var(--accent); text-transform: uppercase; white-space: nowrap;
}
#topbar .sub {
  font-family: var(--mono); font-size: 11px;
  color: var(--dim); letter-spacing: 2px; white-space: nowrap;
}
#topbar .spacer { flex: 1; }
#airport-badge {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--yellow); letter-spacing: 3px;
  padding: 4px 12px; border: 1px solid var(--yellow);
  border-radius: 3px; background: rgba(255,193,7,.08);
  display: none;
}

#body { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT SIDEBAR ────────────────────── */
#sidebar {
  width: 300px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sb-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-head {
  padding: 8px 14px;
  background: #0a1520;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent); display: flex; align-items: center; gap: 8px;
}
.sb-head .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* DROP ZONE */
#dropzone {
  margin: 14px; border: 2px dashed var(--border2);
  border-radius: 6px; padding: 28px 16px;
  text-align: center; cursor: pointer;
  transition: all .2s; position: relative;
  background: rgba(0,212,255,.02);
}
#dropzone:hover, #dropzone.drag-over {
  border-color: var(--accent); background: rgba(0,212,255,.07);
}
#dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
#dropzone .dz-icon { font-size: 32px; margin-bottom: 10px; }
#dropzone .dz-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 4px;
}
#dropzone .dz-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); }

/* STATS */
#stats-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 1px; background: var(--border);
  border-top: 1px solid var(--border);
}
.stat-cell {
  background: var(--panel); padding: 10px 10px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-val {
  font-family: var(--mono); font-size: 18px; font-weight: 700;
  color: var(--accent);
}
.stat-lbl { font-family: var(--mono); font-size: 9px; color: var(--dim); letter-spacing: 1px; }

/* LAYERS */
#layers-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.layer-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.layer-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
.layer-swatch { width: 18px; height: 3px; border-radius: 2px; }
.toggle {
  width: 34px; height: 18px; border-radius: 9px;
  background: var(--border2); cursor: pointer;
  position: relative; transition: background .2s; border: none;
  flex-shrink: 0;
}
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--dim); transition: all .2s;
}
.toggle.on { background: rgba(61,255,110,.2); border: 1px solid var(--green); }
.toggle.on::after { left: 17px; background: var(--green); }

/* PATHFINDER */
#pathfinder-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.pf-row { display: flex; gap: 8px; align-items: center; }
.pf-label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 1px; min-width: 28px; }
.pf-input {
  flex: 1; background: #0a1520; border: 1px solid var(--border2);
  color: var(--text); font-family: var(--mono); font-size: 13px;
  padding: 6px 10px; border-radius: 3px; outline: none;
  transition: border-color .2s;
}
.pf-input:focus { border-color: var(--accent); }
.pf-input::placeholder { color: var(--dim); }

#btn-find {
  width: 100%;
  background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(255,0,170,.15));
  border: 1px solid var(--accent);
  color: var(--accent); font-family: var(--mono); font-size: 12px;
  letter-spacing: 3px; padding: 9px; cursor: pointer;
  border-radius: 3px; transition: all .2s; text-transform: uppercase;
}
#btn-find:hover { background: rgba(0,212,255,.25); box-shadow: 0 0 20px rgba(0,212,255,.2); }
#btn-find:disabled { opacity: .3; cursor: not-allowed; }

#btn-clear {
  width: 100%;
  background: transparent; border: 1px solid var(--border2);
  color: var(--dim); font-family: var(--mono); font-size: 11px;
  letter-spacing: 2px; padding: 7px; cursor: pointer;
  border-radius: 3px; transition: all .2s;
}
#btn-clear:hover { border-color: var(--red); color: var(--red); }

#path-result {
  background: #060c10; border: 1px solid var(--border);
  border-radius: 3px; padding: 10px; min-height: 60px;
  font-family: var(--mono); font-size: 11px; line-height: 1.7;
  display: none;
}
#path-result .pr-head { color: var(--path); font-size: 10px; letter-spacing: 2px; margin-bottom: 6px; }
#path-result .pr-node { color: var(--text); }
#path-result .pr-node .nid { color: var(--accent); }
#path-result .pr-node .nm  { color: var(--dim); }
#path-result .pr-dist { color: var(--yellow); margin-top: 6px; font-size: 10px; }
#path-result .pr-err  { color: var(--red); }

/* NODE TABLE */
#node-table-wrap {
  flex: 1; overflow-y: auto; min-height: 0;
}
#node-table-wrap table { width: 100%; border-collapse: collapse; }
#node-table-wrap thead { position: sticky; top: 0; z-index: 2; }
#node-table-wrap th {
  background: #0a1520; color: var(--accent2);
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
  padding: 6px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
}
#node-table-wrap td {
  padding: 4px 10px; border-bottom: 1px solid #0d1520;
  font-family: var(--mono); font-size: 11px; cursor: pointer;
}
#node-table-wrap tr:hover td { background: #0d2030; }
#node-table-wrap tr.selected td { background: rgba(0,212,255,.12); }
.nid-cell { color: var(--accent); font-weight: 700; }
.nm-cell  { color: var(--text-dim); }
.rwy-cell { color: var(--yellow); }

/* ── CANVAS AREA ─────────────────────── */
#canvas-wrap {
  flex: 1; position: relative; overflow: hidden;
  background: #04070a;
}
#mapCanvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

/* CANVAS OVERLAY HINT */
#hint {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; pointer-events: none;
  transition: opacity .4s;
}
#hint .hint-icon { font-size: 56px; opacity: .15; }
#hint .hint-text {
  font-family: var(--mono); font-size: 13px;
  color: var(--dim); letter-spacing: 3px;
  text-align: center; line-height: 2;
}

/* TOOLTIP */
#tooltip {
  position: fixed; pointer-events: none;
  background: rgba(13,25,40,.97);
  border: 1px solid var(--accent);
  color: var(--text); padding: 8px 12px;
  font-family: var(--mono); font-size: 11px;
  border-radius: 3px; z-index: 200; display: none;
  line-height: 1.8; max-width: 220px;
  box-shadow: 0 0 20px rgba(0,212,255,.15);
}

/* PATH INFO OVERLAY (on canvas) */
#path-overlay {
  position: absolute; bottom: 14px; right: 14px;
  background: rgba(7,9,13,.93); border: 1px solid var(--path);
  border-radius: 4px; padding: 10px 14px;
  font-family: var(--mono); font-size: 11px; line-height: 1.8;
  display: none; max-width: 260px;
  box-shadow: 0 0 24px rgba(255,0,170,.2);
}
#path-overlay .po-head { color: var(--path); letter-spacing: 2px; font-size: 10px; margin-bottom: 4px; }
#path-overlay .po-nodes { color: var(--text); }
#path-overlay .po-dist { color: var(--yellow); margin-top: 4px; font-size: 10px; }

/* PROGRESS BAR */
#parse-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: transparent; z-index: 10;
}
#parse-bar-fill {
  height: 100%; width: 0; background: var(--accent);
  transition: width .3s; box-shadow: 0 0 8px var(--accent);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <h1>Taxiway</h1>
    <span class="sub">PATHFINDER</span>
    <div class="spacer"></div>
    <div id="airport-badge"></div>
    <span class="sub" style="font-size:10px">apt.dat · X-Plane 12</span>
  </div>

  <div id="body">

    <!-- SIDEBAR -->
    <div id="sidebar">

      <!-- DROP ZONE -->
      <div class="sb-section">
        <div class="sb-head"><div class="dot"></div>SOURCE</div>
        <div id="dropzone">
          <input type="file" id="fileInput" accept=".dat,.txt">
          <div class="dz-icon">📡</div>
          <div class="dz-title">Déposer apt.dat ici</div>
          <div class="dz-sub">ou cliquer pour sélectionner</div>
        </div>
        <div id="stats-grid">
          <div class="stat-cell"><span class="stat-val" id="st-nodes">—</span><span class="stat-lbl">NŒUDS</span></div>
          <div class="stat-cell"><span class="stat-val" id="st-segs">—</span><span class="stat-lbl">SEGMENTS</span></div>
          <div class="stat-cell"><span class="stat-val" id="st-rwys">—</span><span class="stat-lbl">PISTES</span></div>
        </div>
      </div>

      <!-- LAYERS -->
      <div class="sb-section">
        <div class="sb-head"><div class="dot" style="background:var(--green)"></div>COUCHES</div>
        <div id="layers-body">
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#ffc107;height:4px"></span>Pistes</span>
            <button class="toggle on" id="tog-runway" onclick="toggleL('runway',this)"></button>
          </div>
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#3dff6e"></span>Taxiways E</span>
            <button class="toggle on" id="tog-taxiway_E" onclick="toggleL('taxiway_E',this)"></button>
          </div>
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#00d4ff"></span>Taxiways C/D</span>
            <button class="toggle on" id="tog-taxiway_CD" onclick="toggleL('taxiway_CD',this)"></button>
          </div>
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#3a5570;border-top:1px dashed #3a5570;height:0"></span>Service</span>
            <button class="toggle on" id="tog-service" onclick="toggleL('service',this)"></button>
          </div>
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#3dff6e;height:6px;border-radius:50%;width:6px"></span>Nœuds</span>
            <button class="toggle on" id="tog-nodes" onclick="toggleL('nodes',this)"></button>
          </div>
          <div class="layer-row">
            <span class="layer-label"><span class="layer-swatch" style="background:#ff6b35;height:6px;border-radius:50%;width:6px"></span>Seuils</span>
            <button class="toggle on" id="tog-thresh" onclick="toggleL('thresh',this)"></button>
          </div>
        </div>
      </div>

      <!-- PATHFINDER -->
      <div class="sb-section">
        <div class="sb-head"><div class="dot" style="background:var(--path)"></div>PATHFINDER — DIJKSTRA</div>
        <div id="pathfinder-body">
          <div class="pf-row">
            <span class="pf-label">FROM</span>
            <input class="pf-input" id="pf-from" type="number" placeholder="ID nœud départ" min="0">
          </div>
          <div class="pf-row">
            <span class="pf-label">TO</span>
            <input class="pf-input" id="pf-to" type="number" placeholder="ID nœud arrivée" min="0">
          </div>
          <button id="btn-find" onclick="findPath()" disabled>▶ CALCULER CHEMIN</button>
          <button id="btn-clear" onclick="clearPath()">✕ EFFACER</button>
          <div id="path-result"></div>
        </div>
      </div>

      <!-- NODE TABLE -->
      <div class="sb-section" style="border-bottom:none">
        <div class="sb-head"><div class="dot" style="background:var(--yellow)"></div>NŒUDS <span id="node-count" style="color:var(--dim);margin-left:6px">0</span></div>
      </div>
      <div id="node-table-wrap">
        <table>
          <thead><tr><th>ID</th><th>NOM</th><th>TYPE</th></tr></thead>
          <tbody id="nodeTableBody"></tbody>
        </table>
      </div>

    </div>

    <!-- CANVAS -->
    <div id="canvas-wrap">
      <canvas id="mapCanvas"></canvas>
      <div id="hint">
        <div class="hint-icon">🛩️</div>
        <div class="hint-text">DÉPOSER UN FICHIER apt.dat<br>POUR COMMENCER</div>
      </div>
      <div id="path-overlay">
        <div class="po-head">◈ CHEMIN CALCULÉ</div>
        <div class="po-nodes" id="po-nodes"></div>
        <div class="po-dist" id="po-dist"></div>
      </div>
      <div id="parse-bar"><div id="parse-bar-fill"></div></div>
    </div>

  </div>
</div>

<div id="tooltip"></div>

<script>
// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let NODES = {};       // id -> {lat, lon, name, isRwyNode, isThresh}
let SEGMENTS = [];    // [{n1,n2,type,name}]
let RUNWAYS = [];     // [{id, lat, lon}]
let THRESH = [];      // virtual threshold nodes
let GRAPH = {};       // adjacency for Dijkstra
let currentPath = []; // array of node ids

let airportName = '';
let airportICAO = '';

// Camera
const cam = { x:0, y:0, scale:1 };
let latMin,latMax,lonMin,lonMax,latRange,lonRange;

// Layers
const layers = {
  runway: true, taxiway_E: true, taxiway_CD: true,
  service: true, nodes: true, thresh: true
};

// Interaction
let isDragging = false, dragStart={x:0,y:0}, camAtDrag={x:0,y:0};
let lastTouchDist = 0;

// ════════════════════════════════════════════════════════════
//  FILE PARSING
// ════════════════════════════════════════════════════════════
function parseAptDat(text) {
  NODES = {}; SEGMENTS = []; RUNWAYS = []; THRESH = []; GRAPH = {}; currentPath = [];

  const lines = text.split(/\r?\n/);
  let progress = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const p = line.split(/\s+/);

    if (p[0] === '1' || p[0] === '16' || p[0] === '17') {
      // Airport header
      if (p.length >= 6) {
        airportICAO = p[4] || '';
        airportName = p.slice(5).join(' ');
      }
    }
    else if (p[0] === '1302' && p[1] === 'icao_code') {
      airportICAO = p[2] || airportICAO;
    }
    else if (p[0] === '100') {
      // Runway row: 100 width surf ... rwy1 lat1 lon1 ... rwy2 lat2 lon2
      if (p.length >= 20) {
        RUNWAYS.push({id: p[8],  lat: parseFloat(p[9]),  lon: parseFloat(p[10])});
        RUNWAYS.push({id: p[17], lat: parseFloat(p[18]), lon: parseFloat(p[19])});
      }
    }
    else if (p[0] === '1201') {
      const id = parseInt(p[4]);
      NODES[id] = { lat: parseFloat(p[1]), lon: parseFloat(p[2]),
                    name: p.slice(5).join(' ') || '', isRwyNode: false, isThresh: false };
    }
    else if (p[0] === '1202' || p[0] === '1206') {
      const n1 = parseInt(p[1]), n2 = parseInt(p[2]);
      let stype = p[4] || 'taxiway_E';
      if (p[0] === '1206') stype = 'service';
      const name = p.slice(5).join(' ') || '';
      SEGMENTS.push({n1, n2, type: stype, name});
    }

    if (i % 5000 === 0) {
      document.getElementById('parse-bar-fill').style.width = ((i/lines.length)*100)+'%';
    }
  }
  document.getElementById('parse-bar-fill').style.width = '100%';
  setTimeout(()=>{ document.getElementById('parse-bar-fill').style.width='0'; }, 600);

  // Mark runway nodes
  const rwyNodeSet = new Set();
  SEGMENTS.forEach(s => {
    if (s.type === 'runway') { rwyNodeSet.add(s.n1); rwyNodeSet.add(s.n2); }
  });
  rwyNodeSet.forEach(id => { if (NODES[id]) NODES[id].isRwyNode = true; });

  // ── THRESHOLD NODES ──────────────────────────────────────────
  // Rule: check if a node with the EXACT same lat & lon already
  // exists in NODES. If YES → reuse that ID. If NO → create new.
  THRESH = [];
  const coordIndex = {};
  Object.entries(NODES).forEach(([id, n]) => {
    coordIndex[n.lat + '_' + n.lon] = parseInt(id);
  });
  let nextVirtualId = Math.max(...Object.keys(NODES).map(Number)) + 1;

  RUNWAYS.forEach(r => {
    const key = r.lat + '_' + r.lon;
    let threshId, isVirtual;
    if (coordIndex[key] !== undefined) {
      // Exact existing node — reuse
      threshId = coordIndex[key];
      isVirtual = false;
      NODES[threshId].isThresh = true;
      NODES[threshId].rwy_id   = r.id;
      if (!NODES[threshId].name) NODES[threshId].name = 'Seuil RWY ' + r.id;
    } else {
      // No existing node — generate
      threshId = nextVirtualId++;
      isVirtual = true;
      NODES[threshId] = {
        lat: r.lat, lon: r.lon,
        name: 'Seuil RWY ' + r.id,
        rwy_id: r.id, isThresh: true,
        isVirtual: true, isRwyNode: false
      };
    }
    THRESH.push({ id: threshId, lat: r.lat, lon: r.lon,
                  rwy_id: r.id, isThresh: true, isVirtual });
  });

  // Connect each threshold to the nearest runway-segment node (backtaxi)
  // Skip if it already sits on a runway segment (exact match case)
  THRESH.forEach(t => {
    const alreadyConnected = SEGMENTS.some(s =>
      s.type === 'runway' && (s.n1 === t.id || s.n2 === t.id)
    );
    if (alreadyConnected) return;
    let best = null, bestD = Infinity;
    rwyNodeSet.forEach(nid => {
      const nd = NODES[nid];
      if (!nd || nid === t.id) return;
      const d = haversine(nd.lat, nd.lon, t.lat, t.lon);
      if (d < bestD) { bestD = d; best = nid; }
    });
    if (best !== null) {
      SEGMENTS.push({n1: t.id, n2: best, type: 'backtaxi',
                     name: 'BACKTAXI RWY ' + t.rwy_id});
    }
  });

  // Build graph for Dijkstra
  Object.keys(NODES).forEach(id => { GRAPH[id] = []; });
  SEGMENTS.forEach(s => {
    const d = haversine(NODES[s.n1]?.lat, NODES[s.n1]?.lon, NODES[s.n2]?.lat, NODES[s.n2]?.lon);
    if (!isNaN(d)) {
      GRAPH[s.n1] = GRAPH[s.n1] || [];
      GRAPH[s.n2] = GRAPH[s.n2] || [];
      GRAPH[s.n1].push({to: s.n2, dist: d});
      GRAPH[s.n2].push({to: s.n1, dist: d});
    }
  });

  // Bounds
  const allN = Object.values(NODES);
  latMin = Math.min(...allN.map(n=>n.lat));
  latMax = Math.max(...allN.map(n=>n.lat));
  lonMin = Math.min(...allN.map(n=>n.lon));
  lonMax = Math.max(...allN.map(n=>n.lon));
  latRange = latMax - latMin || 0.001;
  lonRange = lonMax - lonMin || 0.001;

  updateUI();
}

function haversine(lat1, lon1, lat2, lon2) {
  if (lat1==null||lat2==null) return Infinity;
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ════════════════════════════════════════════════════════════
//  DIJKSTRA
// ════════════════════════════════════════════════════════════
function dijkstra(startId, endId) {
  const dist = {};
  const prev = {};
  const visited = new Set();
  const pq = []; // min-heap simulated with sorted array

  Object.keys(GRAPH).forEach(id => dist[id] = Infinity);
  dist[startId] = 0;
  pq.push([0, startId]);

  while (pq.length > 0) {
    pq.sort((a,b) => a[0]-b[0]);
    const [d, u] = pq.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    if (u == endId) break;

    (GRAPH[u] || []).forEach(edge => {
      const nd = d + edge.dist;
      if (nd < (dist[edge.to] ?? Infinity)) {
        dist[edge.to] = nd;
        prev[edge.to] = u;
        pq.push([nd, edge.to]);
      }
    });
  }

  if (dist[endId] === Infinity) return null;

  // Reconstruct path
  const path = [];
  let cur = String(endId);
  while (cur !== undefined) {
    path.unshift(parseInt(cur));
    cur = prev[cur];
  }
  return { path, dist: dist[endId] };
}

function findPath() {
  const fromId = parseInt(document.getElementById('pf-from').value);
  const toId   = parseInt(document.getElementById('pf-to').value);
  const res = document.getElementById('path-result');

  if (!NODES[fromId] || !NODES[toId]) {
    res.style.display = 'block';
    res.innerHTML = '<span class="pr-err">✕ Nœud introuvable</span>';
    return;
  }
  const result = dijkstra(fromId, toId);
  if (!result) {
    res.style.display = 'block';
    res.innerHTML = '<span class="pr-err">✕ Aucun chemin trouvé</span>';
    currentPath = [];
    draw();
    return;
  }

  currentPath = result.path;
  const distM = result.dist.toFixed(0);
  const distFt = (result.dist * 3.281).toFixed(0);

  // Sidebar result
  res.style.display = 'block';
  let html = '<div class="pr-head">◈ CHEMIN · ' + result.path.length + ' NŒUDS</div>';
  result.path.forEach((id, i) => {
    const n = NODES[id];
    html += `<div class="pr-node"><span class="nid">${id}</span> <span class="nm">${n?.name||''}</span></div>`;
  });
  html += `<div class="pr-dist">↔ ${distM} m · ${distFt} ft</div>`;
  res.innerHTML = html;

  // Canvas overlay
  const poN = document.getElementById('po-nodes');
  const poD = document.getElementById('po-dist');
  poN.textContent = result.path.map(id => {
    const n = NODES[id];
    return `${id}${n?.name ? ' ('+n.name+')' : ''}`;
  }).join(' → ');
  poD.textContent = `↔ ${distM} m · ${distFt} ft · ${result.path.length} nœuds`;
  document.getElementById('path-overlay').style.display = 'block';

  // Highlight node rows in table
  document.querySelectorAll('#nodeTableBody tr').forEach(tr => {
    tr.classList.toggle('selected', result.path.includes(parseInt(tr.dataset.id)));
  });

  draw();

  // Auto-zoom to fit path
  zoomToPath(result.path);
}

function clearPath() {
  currentPath = [];
  document.getElementById('path-result').style.display = 'none';
  document.getElementById('path-overlay').style.display = 'none';
  document.querySelectorAll('#nodeTableBody tr').forEach(tr => tr.classList.remove('selected'));
  draw();
}

function zoomToPath(path) {
  if (path.length < 2) return;
  const lats = path.map(id => NODES[id]?.lat).filter(Boolean);
  const lons = path.map(id => NODES[id]?.lon).filter(Boolean);
  const pLatMin = Math.min(...lats) - latRange*.02;
  const pLatMax = Math.max(...lats) + latRange*.02;
  const pLonMin = Math.min(...lons) - lonRange*.02;
  const pLonMax = Math.max(...lons) + lonRange*.02;
  const pLatR = pLatMax - pLatMin, pLonR = pLonMax - pLonMin;
  const canvas = document.getElementById('mapCanvas');
  const W = canvas.width, H = canvas.height;
  const scX = W * .85 / pLonR, scY = H * .85 / pLatR;
  cam.scale = Math.min(scX, scY);
  const midLat = (pLatMin+pLatMax)/2, midLon = (pLonMin+pLonMax)/2;
  const sc = toScreen(midLat, midLon);
  cam.x += W/2 - sc.x;
  cam.y += H/2 - sc.y;
  draw();
}

function selectNode(id) {
  const fromInp = document.getElementById('pf-from');
  const toInp   = document.getElementById('pf-to');
  if (!fromInp.value || document.activeElement === fromInp) {
    fromInp.value = id;
  } else {
    toInp.value = id;
  }
  highlightNode(id);
}

function updateUI() {
  const nodeCount = Object.keys(NODES).filter(id => !NODES[parseInt(id)].isVirtual).length;
  const threshVirtCount = THRESH.filter(t => t.isVirtual).length;
  document.getElementById('st-nodes').textContent = nodeCount;
  document.getElementById('st-segs').textContent  = SEGMENTS.filter(s=>s.type!=='backtaxi').length;
  document.getElementById('st-rwys').textContent  = RUNWAYS.length/2 | 0;

  const badge = document.getElementById('airport-badge');
  badge.textContent = airportICAO + (airportName ? ' · ' + airportName.substring(0,22) : '');
  badge.style.display = 'block';
  document.title = airportICAO + ' — Taxiway Pathfinder';

  document.getElementById('node-count').textContent =
    nodeCount + (threshVirtCount > 0 ? ' +' + threshVirtCount + ' seuils' : '');
  document.getElementById('btn-find').disabled = false;
  document.getElementById('hint').style.opacity = '0';
  setTimeout(()=>{ document.getElementById('hint').style.display='none'; }, 400);

  // Build node table
  const tbody = document.getElementById('nodeTableBody');
  tbody.innerHTML = '';

  // Threshold nodes at the top
  THRESH.forEach(t => {
    const n = NODES[t.id];
    const tr = document.createElement('tr');
    tr.dataset.id = t.id;
    tr.style.borderLeft = '3px solid #ff6b35';
    const badge2 = t.isVirtual
      ? '<span style="color:#3a5570;font-size:9px;font-family:Share Tech Mono"> +VRT</span>'
      : '<span style="color:#3dff6e;font-size:9px;font-family:Share Tech Mono"> APT</span>';
    tr.innerHTML = `<td class="nid-cell" style="color:#ff6b35">${t.id}${badge2}</td>
      <td class="rwy-cell">${n.name}</td>
      <td class="rwy-cell">SEUIL</td>`;
    tr.addEventListener('click', () => selectNode(t.id));
    tbody.appendChild(tr);
  });

  // Divider
  const sep = document.createElement('tr');
  sep.innerHTML = '<td colspan="3" style="background:#0a1520;color:#3a5570;font-size:9px;padding:4px 10px;letter-spacing:2px;font-family:Share Tech Mono,monospace">─── NŒUDS APT.DAT ───</td>';
  tbody.appendChild(sep);

  // All non-threshold nodes sorted by ID
  const sortedIds = Object.keys(NODES).map(Number)
    .filter(id => !NODES[id].isThresh)
    .sort((a,b)=>a-b);
  sortedIds.forEach(id => {
    const n = NODES[id];
    const isRwy = n.isRwyNode;
    const tr = document.createElement('tr');
    tr.dataset.id = id;
    tr.innerHTML = `<td class="nid-cell">${id}</td>
      <td class="nm-cell">${n.name}</td>
      <td class="${isRwy?'rwy-cell':'nm-cell'}">${isRwy?'RWY':'TWY'}</td>`;
    tr.addEventListener('click', () => selectNode(id));
    tbody.appendChild(tr);
  });

  // Fit canvas
  fitCanvas();
}

function highlightNode(id) {
  const canvas = document.getElementById('mapCanvas');
  const n = NODES[id];
  if (!n) return;
  const p = toScreen(n.lat, n.lon);
  // Animate: flash a circle
  let r = 5, alpha = 1;
  const flash = () => {
    draw();
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = alpha;
    ctx.stroke();
    ctx.globalAlpha = 1;
    r += 2; alpha -= 0.08;
    if (alpha > 0) requestAnimationFrame(flash);
    else draw();
  };
  flash();
}

// ════════════════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════════════════
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

function fitCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const W = canvas.width, H = canvas.height;
  const scX = W*.88/lonRange, scY = H*.88/latRange;
  cam.scale = Math.min(scX, scY);
  const midLat = (latMin+latMax)/2, midLon = (lonMin+lonMax)/2;
  cam.x = W/2 - (midLon-lonMin)*cam.scale;
  cam.y = H/2 - (latMax-midLat)*cam.scale;
  draw();
}

function toScreen(lat, lon) {
  return {
    x: (lon-lonMin)*cam.scale + cam.x,
    y: (latMax-lat)*cam.scale + cam.y
  };
}
function fromScreen(sx, sy) {
  return {
    lat: latMax - (sy-cam.y)/cam.scale,
    lon: (sx-cam.x)/cam.scale + lonMin
  };
}

function segmentColor(type) {
  if (type==='runway')   return {color:'#ffc107', lw: 5, alpha:0.9};
  if (type==='backtaxi') return {color:'#ff6b35', lw: 2, alpha:0.7, dash:[6,4]};
  if (type==='service')  return {color:'#243548', lw: 1, alpha:0.6, dash:[3,4]};
  if (type==='taxiway_E') return {color:'#3dff6e', lw: 2.5, alpha:0.85};
  return {color:'#00d4ff', lw: 1.5, alpha:0.7}; // C/D
}

function draw() {
  if (!canvas.width) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Faint grid
  ctx.strokeStyle = '#0d1520'; ctx.lineWidth=1;
  for(let i=0;i<24;i++){
    const x=W/24*i; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let i=0;i<18;i++){
    const y=H/18*i; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Segments
  SEGMENTS.forEach(s => {
    const n1=NODES[s.n1], n2=NODES[s.n2];
    if(!n1||!n2) return;

    // Layer filter
    if (s.type==='runway'   && !layers.runway)    return;
    if (s.type==='service'  && !layers.service)   return;
    if (s.type==='taxiway_E' && !layers.taxiway_E) return;
    if ((s.type==='taxiway_C'||s.type==='taxiway_D') && !layers.taxiway_CD) return;
    if (s.type==='backtaxi' && !layers.thresh)    return;

    const p1=toScreen(n1.lat,n1.lon), p2=toScreen(n2.lat,n2.lon);
    const st=segmentColor(s.type);

    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
    ctx.strokeStyle=st.color;
    ctx.lineWidth=st.lw;
    ctx.globalAlpha=st.alpha;
    if(st.dash) ctx.setLineDash(st.dash); else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;

    // Taxiway name labels — visible at moderate zoom, scale with zoom
    if(s.name && s.type!=='service' && s.type!=='backtaxi') {
      const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
      // Scale font size with zoom, minimum 10px
      const fontSize = Math.max(10, Math.min(18, cam.scale / lonRange * 0.00055));
      const threshold = lonRange * 800; // appear well before node IDs
      if(cam.scale > threshold) {
        ctx.save();
        ctx.font = `bold ${fontSize}px Share Tech Mono`;
        ctx.shadowColor = '#000'; ctx.shadowBlur = 6;
        ctx.fillStyle = st.color;
        ctx.globalAlpha = Math.min(1, (cam.scale - threshold) / threshold * 2 + 0.5);
        // Tiny background pill for contrast
        const tw = ctx.measureText(s.name).width;
        ctx.fillStyle = 'rgba(4,7,10,0.65)';
        ctx.fillRect(mx - tw/2 - 2, my - fontSize - 1, tw + 4, fontSize + 3);
        ctx.fillStyle = st.color;
        ctx.textAlign = 'center';
        ctx.fillText(s.name, mx, my - 2);
        ctx.textAlign = 'left';
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
  });

  // PATH — draw with glow
  if (currentPath.length >= 2) {
    // Glow pass
    ctx.save();
    ctx.shadowColor='#ff00aa'; ctx.shadowBlur=16;
    ctx.strokeStyle='#ff00aa'; ctx.lineWidth=5; ctx.globalAlpha=0.5;
    ctx.beginPath();
    for(let i=0;i<currentPath.length;i++){
      const n=NODES[currentPath[i]]; if(!n) continue;
      const p=toScreen(n.lat,n.lon);
      i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
    ctx.restore();

    // Solid pass
    ctx.strokeStyle='#ff00aa'; ctx.lineWidth=3; ctx.globalAlpha=1;
    ctx.beginPath();
    for(let i=0;i<currentPath.length;i++){
      const n=NODES[currentPath[i]]; if(!n) continue;
      const p=toScreen(n.lat,n.lon);
      i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();

    // Path node dots + sequence numbers
    currentPath.forEach((id,idx) => {
      const n=NODES[id]; if(!n) return;
      const p=toScreen(n.lat,n.lon);
      const isEndpoint = idx===0||idx===currentPath.length-1;
      const r = isEndpoint ? 10 : 7;
      const col = idx===0?'#00ff88':(idx===currentPath.length-1?'#ff4444':'#ff00aa');
      // Glow halo
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*2.5);
      g.addColorStop(0, col+'99'); g.addColorStop(1, col+'00');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*2.5,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      // Dark outline ring for contrast
      ctx.beginPath(); ctx.arc(p.x,p.y,r+2,0,Math.PI*2);
      ctx.fillStyle='#07090d'; ctx.fill();
      // Colored dot
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle=col; ctx.fill();
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5; ctx.stroke();
      // Sequence label — always visible on path
      ctx.font='bold 11px Share Tech Mono';
      ctx.fillStyle='#ffffff';
      ctx.shadowColor='#000'; ctx.shadowBlur=6;
      ctx.fillText(idx, p.x+r+3, p.y+4);
      ctx.shadowBlur=0;
    });
  }

  // NODES — size scales with zoom, minimum 4px, good contrast always
  if(layers.nodes){
    // nr grows with zoom so nodes are always comfortably visible
    const nr = Math.max(4, Math.min(10, cam.scale / lonRange * 0.00012));
    const strokeW = Math.max(1.5, nr * 0.35);
    Object.entries(NODES).forEach(([id,n])=>{
      if(n.isThresh) return;
      if(parseInt(id)>=1000) return;
      const p=toScreen(n.lat,n.lon);
      const onPath=currentPath.includes(parseInt(id));
      if(onPath) return; // drawn above with path style

      const col = n.isRwyNode ? '#ffc107' : '#3dff6e';

      // Soft glow halo for visibility against dark bg
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,nr*2.2);
      g.addColorStop(0, n.isRwyNode?'rgba(255,193,7,.30)':'rgba(61,255,110,.25)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(p.x,p.y,nr*2.2,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();

      // Dark ring (contrast border) — critical for visibility
      ctx.beginPath(); ctx.arc(p.x,p.y,nr+strokeW,0,Math.PI*2);
      ctx.fillStyle='rgba(4,7,10,0.85)'; ctx.fill();

      // Main dot
      ctx.beginPath(); ctx.arc(p.x,p.y,nr,0,Math.PI*2);
      ctx.fillStyle=col; ctx.globalAlpha=0.95; ctx.fill();
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=strokeW*0.6;
      ctx.globalAlpha=0.5; ctx.stroke();
      ctx.globalAlpha=1;

      // Node ID label — appears earlier and bigger
      if(cam.scale>lonRange*2500){
        const fontSize = Math.max(9, Math.min(13, nr*1.4));
        ctx.font=`bold ${fontSize}px Share Tech Mono`;
        ctx.shadowColor='#000000'; ctx.shadowBlur=5;
        ctx.fillStyle=col;
        ctx.fillText(id, p.x+nr+3, p.y+4);
        ctx.shadowBlur=0;
      }
    });
  }

  // THRESHOLDS — draw ALL thresh entries (reused apt nodes + virtual)
  if(layers.thresh){
    THRESH.forEach(t=>{
      const p=toScreen(t.lat,t.lon);
      const r=Math.max(6,Math.min(11,cam.scale/lonRange*.000055));
      // Glow halo
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*3);
      g.addColorStop(0,'rgba(255,107,53,.45)'); g.addColorStop(1,'rgba(255,107,53,0)');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      // Dark contrast ring
      ctx.beginPath(); ctx.arc(p.x,p.y,r+2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(4,7,10,0.85)'; ctx.fill();
      // Main dot
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle='#ff6b35'; ctx.fill();
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.8; ctx.stroke();
      // Small indicator: VRT vs APT
      ctx.beginPath(); ctx.arc(p.x,p.y,r*.35,0,Math.PI*2);
      ctx.fillStyle = t.isVirtual ? '#fff' : '#3dff6e';
      ctx.fill();
      // Label
      const lblScale = cam.scale/lonRange;
      if(lblScale > 800){
        const fontSize = Math.max(11, Math.min(16, lblScale*0.0055));
        ctx.font=`bold ${fontSize}px Exo 2`;
        ctx.shadowColor='#000'; ctx.shadowBlur=6;
        ctx.fillStyle='#ffc107';
        ctx.fillText('RWY '+t.rwy_id+' ('+t.id+')', p.x+r+5, p.y+4);
        ctx.shadowBlur=0;
        if(!t.isVirtual){
          ctx.font=`${Math.max(9,fontSize-3)}px Share Tech Mono`;
          ctx.fillStyle='#3dff6e';
          ctx.fillText('APT', p.x+r+5, p.y+4+fontSize);
        }
      }
    });
  }
}

function toggleL(layer, btn) {
  // Handle C and D together
  if(layer==='taxiway_CD'){
    layers.taxiway_C=!layers.taxiway_C; layers.taxiway_D=!layers.taxiway_CD;
    layers.taxiway_CD=!layers.taxiway_CD;
    btn.classList.toggle('on',layers.taxiway_CD);
  } else {
    layers[layer]=!layers[layer];
    btn.classList.toggle('on',layers[layer]);
  }
  draw();
}

canvas.addEventListener('mousedown', e=>{
  isDragging=true; dragStart={x:e.clientX,y:e.clientY}; camAtDrag={x:cam.x,y:cam.y};
  canvas.style.cursor='grabbing';
});
canvas.addEventListener('mouseup', ()=>{ isDragging=false; canvas.style.cursor='crosshair'; });
canvas.addEventListener('mouseleave', ()=>{ isDragging=false; document.getElementById('tooltip').style.display='none'; });

canvas.addEventListener('mousemove', e=>{
  if(isDragging){
    cam.x=camAtDrag.x+(e.clientX-dragStart.x);
    cam.y=camAtDrag.y+(e.clientY-dragStart.y);
    draw(); return;
  }
  // Tooltip
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const world=fromScreen(mx,my);
  let closest=null, closestD=Infinity;
  Object.entries(NODES).forEach(([id,n])=>{
    const dx=(n.lon-world.lon)*Math.cos(n.lat*Math.PI/180)*111320;
    const dy=(n.lat-world.lat)*110540;
    const d=Math.hypot(dx,dy);
    if(d<closestD){closestD=d;closest={id:parseInt(id),...n};}
  });
  const pixThresh=14/cam.scale*lonRange*111320;
  const tip=document.getElementById('tooltip');
  if(closest&&closestD<pixThresh){
    tip.style.display='block';
    tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY-10)+'px';
    const onPath=currentPath.includes(closest.id);
    tip.innerHTML=
      `${closest.isThresh?'⚡':'◉'} <b style="color:${closest.isThresh?'#ff6b35':'#00d4ff'}">Nœud ${closest.id}</b>`+
      (onPath?' <span style="color:#ff00aa">◈ SUR LE CHEMIN</span>':'')+
      `<br>${closest.lat.toFixed(6)}, ${closest.lon.toFixed(6)}<br>`+
      `<span style="color:#ffc107">${closest.name}</span>`+
      `<br><span style="color:#3a5570;font-size:10px">clic: sélectionner comme nœud</span>`;
  } else {
    tip.style.display='none';
  }
});

// Click on canvas to select node for pathfinder
canvas.addEventListener('click', e=>{
  if(isDragging) return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const world=fromScreen(mx,my);
  let closest=null, closestD=Infinity;
  Object.entries(NODES).forEach(([id,n])=>{
    const dx=(n.lon-world.lon)*Math.cos(n.lat*Math.PI/180)*111320;
    const dy=(n.lat-world.lat)*110540;
    const d=Math.hypot(dx,dy);
    if(d<closestD){closestD=d;closest={id:parseInt(id),...n};}
  });
  const pixThresh=14/cam.scale*lonRange*111320;
  if(closest&&closestD<pixThresh){
    const fromInp=document.getElementById('pf-from');
    const toInp=document.getElementById('pf-to');
    if(!fromInp.value||document.activeElement===fromInp){
      fromInp.value=closest.id;
    } else {
      toInp.value=closest.id;
    }
  }
});

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.15:0.87;
  const wx=(mx-cam.x)/cam.scale, wy=(my-cam.y)/cam.scale;
  cam.scale*=factor;
  cam.x=mx-wx*cam.scale; cam.y=my-wy*cam.scale;
  draw();
},{passive:false});

canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===2) lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  else if(e.touches.length===1){ isDragging=true; dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY}; camAtDrag={x:cam.x,y:cam.y}; }
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const factor=d/lastTouchDist;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-canvas.getBoundingClientRect().left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-canvas.getBoundingClientRect().top;
    const wx=(cx-cam.x)/cam.scale,wy=(cy-cam.y)/cam.scale;
    cam.scale*=factor; cam.x=cx-wx*cam.scale; cam.y=cy-wy*cam.scale;
    lastTouchDist=d; draw();
  } else if(e.touches.length===1&&isDragging){
    cam.x=camAtDrag.x+(e.touches[0].clientX-dragStart.x);
    cam.y=camAtDrag.y+(e.touches[0].clientY-dragStart.y);
    draw();
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{ isDragging=false; });

window.addEventListener('resize', ()=>{
  if(Object.keys(NODES).length>0) fitCanvas();
  else {
    const wrap=document.getElementById('canvas-wrap');
    canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight;
  }
});

// ════════════════════════════════════════════════════════════
//  FILE DROP / INPUT
// ════════════════════════════════════════════════════════════
function loadFile(file) {
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ parseAptDat(e.target.result); };
  reader.readAsText(file);
}

document.getElementById('fileInput').addEventListener('change', e=>loadFile(e.target.files[0]));

const dz=document.getElementById('dropzone');
dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);
});

// Enter key triggers pathfinder
document.getElementById('pf-to').addEventListener('keydown', e=>{ if(e.key==='Enter') findPath(); });
document.getElementById('pf-from').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('pf-to').focus(); });

// Initial canvas size
(()=>{
  const wrap=document.getElementById('canvas-wrap');
  canvas.width=wrap.clientWidth; canvas.height=wrap.clientHeight;
})();
</script>
